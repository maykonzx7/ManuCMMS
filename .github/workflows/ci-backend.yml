# ManuCMMS — CI do backend (fase 0.4)
# Dispara em push e PR na branch main.

name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Testes unitários
        run: npm test

      - name: Testes e2e
        run: npm run test:e2e
