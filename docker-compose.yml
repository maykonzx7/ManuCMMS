# ManuCMMS — ambiente local (fase 0)
# Uso: docker compose up -d
# Credenciais padrão são apenas para desenvolvimento.

services:
  postgres:
    image: postgres:16-alpine
    container_name: manucmms-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-manucmms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manucmms_dev}
      POSTGRES_DB: ${POSTGRES_DB:-manucmms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: manucmms-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-manucmms}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-manucmms_dev}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # Usa variáveis já injetadas no container ($$ vira $ no shell do container)
      test:
        [
          "CMD-SHELL",
          'mongosh "mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@127.0.0.1:27017/admin" --quiet --eval "db.adminCommand({ ping: 1 })" || exit 1',
        ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: manucmms-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-manucmms}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-manucmms_dev}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data:
